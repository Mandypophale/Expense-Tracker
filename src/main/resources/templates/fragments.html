<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Common HTML Head fragment -->
<head th:fragment="html-head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' - Expense Tracker'">Expense Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>

<body>

    <!-- Sidebar fragment -->
    <div th:fragment="sidebar(activePage)" class="sidebar">
        <div class="brand">
            <i class="bi bi-wallet2 text-primary"></i>
            <span>Expense Tracker</span>
        </div>
        <nav class="nav flex-column mt-3">
            <a class="nav-link" th:classappend="${activePage == 'dashboard' ? 'active' : ''}" th:href="@{/dashboard}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="nav-link" th:classappend="${activePage == 'expenses' ? 'active' : ''}" th:href="@{/expenses}">
                <i class="bi bi-cash-stack"></i> Expenses
            </a>
            <a class="nav-link" th:classappend="${activePage == 'add-expense' ? 'active' : ''}" th:href="@{/expenses/add}">
                <i class="bi bi-plus-circle"></i> Add Expense
            </a>
            <a class="nav-link" th:classappend="${activePage == 'income' ? 'active' : ''}" th:href="@{/income}">
                <i class="bi bi-graph-up-arrow"></i> Income
            </a>
            <a class="nav-link" th:classappend="${activePage == 'profile' ? 'active' : ''}" th:href="@{/profile}">
                <i class="bi bi-person-circle"></i> Profile
            </a>
        </nav>
    </div>

    <!-- Topbar fragment -->
    <header th:fragment="topbar" class="top-navbar">
        <button id="sidebarToggle" class="sidebar-toggle-btn">
            <i class="bi bi-list"></i>
        </button>
        <div class="d-flex align-items-center gap-3">
            <span class="text-muted d-none d-sm-inline">
                Welcome, <strong class="text-dark" th:text="${session.loggedUser != null ? session.loggedUser.fullName : 'Guest'}">User</strong>
            </span>
            <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm" onclick="return confirmDelete(event, 'Are you sure you want to logout?')">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </header>

    <!-- Footer scripts fragment -->
    <div th:fragment="footer-scripts">
        <!-- Bootstrap 5 Bundle JS (includes Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Custom JS -->
        <script th:src="@{/js/main.js}"></script>
    </div>

</body>
</html>
