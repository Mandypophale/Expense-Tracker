<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html-head('Expenses')}"></head>
<body>

    <div class="d-flex">
        <!-- Sidebar Navigation -->
        <div th:replace="~{fragments :: sidebar('expenses')}"></div>

        <!-- Main Workspace -->
        <div class="main-wrapper flex-grow-1">
            <!-- Top Navbar -->
            <header th:replace="~{fragments :: topbar}"></header>

            <!-- Page Content -->
            <main class="content-area">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-0">Expense Ledger</h2>
                        <p class="text-muted mb-0">Review, filter, and track all your logged expenses.</p>
                    </div>
                    <a th:href="@{/expenses/add}" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-1"></i> Add Expense
                    </a>
                </div>

                <!-- Flash Message Alerts -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show mb-4" role="alert">
                    <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${successMessage}">Success</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> <span th:text="${errorMessage}">Error</span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <!-- Filter Panel -->
                <div class="custom-card p-3 mb-4">
                    <form th:action="@{/expenses}" method="get" class="row g-3 align-items-center">
                        <!-- Search Title -->
                        <div class="col-12 col-md-5">
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-search"></i></span>
                                <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Search by title...">
                            </div>
                        </div>
                        <!-- Filter Category -->
                        <div class="col-12 col-md-4">
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-funnel"></i></span>
                                <select name="category" class="form-select">
                                    <option value="All" th:selected="${selectedCategory == null || selectedCategory == 'All' || selectedCategory == ''}">All Categories</option>
                                    <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}" th:selected="${cat == selectedCategory}">Food</option>
                                </select>
                            </div>
                        </div>
                        <!-- Actions -->
                        <div class="col-12 col-md-3 d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1">
                                <i class="bi bi-filter"></i> Filter
                            </button>
                            <a th:href="@{/expenses}" class="btn btn-outline-secondary flex-grow-1">
                                <i class="bi bi-arrow-counterclockwise"></i> Reset
                            </a>
                        </div>
                    </form>
                </div>

                <!-- Expenses Table Card -->
                <div class="custom-card">
                    <div class="card-header fw-bold">
                        <i class="bi bi-list-task text-primary me-2"></i>Logged Expenses
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">Title</th>
                                        <th>Category</th>
                                        <th>Date</th>
                                        <th>Description</th>
                                        <th>Amount</th>
                                        <th class="text-end pe-4">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="expense : ${expenses}">
                                        <td class="ps-4 fw-medium" th:text="${expense.title}">Grocery</td>
                                        <td>
                                            <span class="badge badge-category" 
                                                  th:text="${expense.category}"
                                                  th:classappend="${
                                                    expense.category == 'Food' ? 'bg-warning text-dark' :
                                                    expense.category == 'Travel' ? 'bg-info text-dark' :
                                                    expense.category == 'Shopping' ? 'bg-primary text-white' :
                                                    expense.category == 'Bills' ? 'bg-danger text-white' :
                                                    expense.category == 'Entertainment' ? 'bg-secondary text-white' :
                                                    expense.category == 'Health' ? 'bg-success text-white' :
                                                    expense.category == 'Education' ? 'bg-dark text-white' : 'bg-light text-dark'
                                                  }">
                                                Food
                                            </span>
                                        </td>
                                        <td th:text="${#temporals.format(expense.expenseDate, 'dd MMM yyyy')}">15 Jul 2026</td>
                                        <td class="text-muted" th:text="${expense.description != null && !expense.description.empty ? expense.description : '-'}">Weekly grocery restock</td>
                                        <td class="text-danger fw-semibold" 
                                            th:text="'-Rs. ' + ${#numbers.formatDecimal(expense.amount, 1, 'COMMA', 2, 'POINT')}">-Rs. 50.00</td>
                                        <td class="text-end pe-4">
                                            <div class="d-inline-flex gap-2">
                                                <a th:href="@{/expenses/edit/{id}(id=${expense.id})}" 
                                                   class="btn btn-icon btn-outline-primary" title="Edit">
                                                    <i class="bi bi-pencil"></i>
                                                </a>
                                                <a th:href="@{/expenses/delete/{id}(id=${expense.id})}" 
                                                   class="btn btn-icon btn-outline-danger" 
                                                   onclick="return confirmDelete(event, 'Are you sure you want to delete this expense?')" 
                                                   title="Delete">
                                                    <i class="bi bi-trash"></i>
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                    <!-- Empty Table Placeholder -->
                                    <tr th:if="${#lists.isEmpty(expenses)}">
                                        <td colspan="6" class="text-center py-5 text-muted">
                                            <i class="bi bi-receipt fs-1 d-block mb-2"></i>
                                            No matching expenses found.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Script imports -->
    <div th:replace="~{fragments :: footer-scripts}"></div>
</body>
</html>
