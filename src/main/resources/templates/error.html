<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: html-head('Error')}"></head>
<body>

    <div class="auth-container">
        <div class="auth-card text-center" style="max-width: 500px;">
            <div class="text-danger fs-1 mb-3">
                <i class="bi bi-exclamation-triangle"></i>
            </div>
            <h3 class="fw-bold mb-3">Oops! Something went wrong</h3>
            
            <div class="alert alert-danger text-start py-3 mb-4" role="alert">
                <p class="mb-1 fw-semibold"><i class="bi bi-info-circle-fill me-2"></i>Error Detail:</p>
                <div class="text-break" th:text="${errorMessage != null ? errorMessage : 'An unexpected server error occurred.'}"></div>
                <div class="small text-muted mt-2 text-break" th:if="${errorDetails}" th:text="${errorDetails}"></div>
            </div>

            <div class="d-grid gap-2">
                <a th:href="@{/dashboard}" class="btn btn-primary">
                    <i class="bi bi-house-door me-1"></i> Back to Dashboard
                </a>
                <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">
                    Reset Session
                </a>
            </div>
        </div>
    </div>

    <!-- Script imports -->
    <div th:replace="~{fragments :: footer-scripts}"></div>
</body>
</html>
